<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Vision Apps for iPhone</title>
    <meta name="description" content="Night vision apps for iPhone — see clearly in low light.">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            color: #d4f5d4;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            text-align: center;
            background:
                radial-gradient(ellipse at center, rgba(0, 80, 0, 0.25) 0%, transparent 70%),
                #000;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #a8f0a8;
            text-shadow: 0 0 24px rgba(80, 220, 80, 0.35);
            margin-bottom: 16px;
        }

        p {
            font-size: clamp(1rem, 2.2vw, 1.25rem);
            max-width: 540px;
            line-height: 1.5;
            color: #8fc28f;
            margin-bottom: 32px;
        }

        .status {
            font-size: 0.85rem;
            color: #5a8a5a;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade4a;
            box-shadow: 0 0 8px #4ade4a;
            margin-right: 8px;
            vertical-align: middle;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <h1>Night Vision Apps</h1>
    <p>See clearly in low light. iPhone apps for night vision, coming soon.</p>
    <div class="status"><span class="dot"></span>Site is live</div>
</body>
</html>
